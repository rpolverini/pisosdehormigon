<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="200" height="200" filter="url(#noise)" opacity="0.4"/>
  <line x1="0" y1="50" x2="200" y2="50" stroke="#9CA3AF" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="100" x2="200" y2="100" stroke="#9CA3AF" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="150" x2="200" y2="150" stroke="#9CA3AF" stroke-width="0.5" opacity="0.3"/>
  <line x1="50" y1="0" x2="50" y2="200" stroke="#9CA3AF" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="0" x2="100" y2="200" stroke="#9CA3AF" stroke-width="0.5" opacity="0.3"/>
  <line x1="150" y1="0" x2="150" y2="200" stroke="#9CA3AF" stroke-width="0.5" opacity="0.3"/>
</svg>
