<svg xmlns="http://www.w3.org/2000/svg" width="400" height="224" viewBox="0 0 400 224">
  <rect width="400" height="224" fill="#1F2937"/>
  <!-- Floor grid -->
  <line x1="0" y1="140" x2="400" y2="140" stroke="#374151" stroke-width="2"/>
  <line x1="66" y1="140" x2="66" y2="224" stroke="#374151" stroke-width="1"/>
  <line x1="133" y1="140" x2="133" y2="224" stroke="#374151" stroke-width="1"/>
  <line x1="200" y1="140" x2="200" y2="224" stroke="#374151" stroke-width="1"/>
  <line x1="267" y1="140" x2="267" y2="224" stroke="#374151" stroke-width="1"/>
  <line x1="333" y1="140" x2="333" y2="224" stroke="#374151" stroke-width="1"/>
  <!-- Building outline -->
  <rect x="60" y="50" width="280" height="90" fill="none" stroke="#f97316" stroke-width="3"/>
  <line x1="60" y1="50" x2="140" y2="20" stroke="#f97316" stroke-width="2"/>
  <line x1="340" y1="50" x2="420" y2="20" stroke="#f97316" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="140" y1="20" x2="420" y2="20" stroke="#f97316" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Door -->
  <rect x="170" y="90" width="60" height="50" fill="none" stroke="#6B7280" stroke-width="2"/>
  <!-- Label -->
  <rect x="100" y="180" width="200" height="30" rx="4" fill="#111827"/>
  <text x="200" y="200" text-anchor="middle" fill="#F9FAFB" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Piso para galpón</text>
</svg>
