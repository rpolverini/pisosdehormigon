<svg xmlns="http://www.w3.org/2000/svg" width="400" height="224" viewBox="0 0 400 224">
  <rect width="400" height="224" fill="#374151"/>
  <!-- Concrete grid pattern -->
  <line x1="0" y1="56" x2="400" y2="56" stroke="#4B5563" stroke-width="1"/>
  <line x1="0" y1="112" x2="400" y2="112" stroke="#4B5563" stroke-width="1"/>
  <line x1="0" y1="168" x2="400" y2="168" stroke="#4B5563" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="224" stroke="#4B5563" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="224" stroke="#4B5563" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="224" stroke="#4B5563" stroke-width="1"/>
  <!-- House outline -->
  <polygon points="200,50 140,100 260,100" fill="none" stroke="#f97316" stroke-width="3"/>
  <rect x="160" y="100" width="80" height="60" fill="none" stroke="#f97316" stroke-width="3"/>
  <rect x="185" y="120" width="30" height="40" fill="none" stroke="#f97316" stroke-width="2"/>
  <!-- Label -->
  <rect x="100" y="180" width="200" height="30" rx="4" fill="#1F2937"/>
  <text x="200" y="200" text-anchor="middle" fill="#F9FAFB" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Platea para vivienda</text>
</svg>
