<svg xmlns="http://www.w3.org/2000/svg" width="400" height="224" viewBox="0 0 400 224">
  <rect width="400" height="224" fill="#292524"/>
  <!-- Stamped pattern - stone/slate look -->
  <!-- Row 1 -->
  <rect x="10" y="10" width="115" height="65" rx="3" fill="#44403C" stroke="#1C1917" stroke-width="2"/>
  <rect x="135" y="10" width="80" height="65" rx="3" fill="#3D3835" stroke="#1C1917" stroke-width="2"/>
  <rect x="225" y="10" width="95" height="65" rx="3" fill="#44403C" stroke="#1C1917" stroke-width="2"/>
  <rect x="330" y="10" width="60" height="65" rx="3" fill="#3D3835" stroke="#1C1917" stroke-width="2"/>
  <!-- Row 2 -->
  <rect x="10" y="85" width="70" height="60" rx="3" fill="#3D3835" stroke="#1C1917" stroke-width="2"/>
  <rect x="90" y="85" width="100" height="60" rx="3" fill="#44403C" stroke="#1C1917" stroke-width="2"/>
  <rect x="200" y="85" width="85" height="60" rx="3" fill="#3D3835" stroke="#1C1917" stroke-width="2"/>
  <rect x="295" y="85" width="95" height="60" rx="3" fill="#44403C" stroke="#1C1917" stroke-width="2"/>
  <!-- Row 3 -->
  <rect x="10" y="155" width="120" height="60" rx="3" fill="#44403C" stroke="#1C1917" stroke-width="2"/>
  <rect x="140" y="155" width="75" height="60" rx="3" fill="#3D3835" stroke="#1C1917" stroke-width="2"/>
  <rect x="225" y="155" width="100" height="60" rx="3" fill="#44403C" stroke="#1C1917" stroke-width="2"/>
  <rect x="335" y="155" width="55" height="60" rx="3" fill="#3D3835" stroke="#1C1917" stroke-width="2"/>
  <!-- Orange accent overlay -->
  <rect x="140" y="78" width="120" height="10" fill="#f97316" opacity="0.6"/>
  <!-- Label -->
  <rect x="100" y="180" width="200" height="30" rx="4" fill="#1C1917" opacity="0.9"/>
  <text x="200" y="200" text-anchor="middle" fill="#F9FAFB" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Hormigón estampado</text>
</svg>
